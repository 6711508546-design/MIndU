<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindU - ระบบติดตามดูแลสุขภาพจิตนักศึกษา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --text-main: #2b2d42;
            --white: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.08);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --primary-blue: #a2d2ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background: linear-gradient(-45deg, #ffc8dd, #bde0fe, #cdb4db, #ffffb5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: var(--shadow);
            padding: 35px;
            margin-top: 10px;
            animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        @keyframes bounceIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1, h2, h3, h4 { text-align: center; margin-bottom: 20px; }
        .text-center { text-align: center; }
        .mt-3 { margin-top: 20px; }
        .mt-4 { margin-top: 35px; }

        .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .btn-primary { background: linear-gradient(135deg, #a2d2ff, #bde0fe); color: var(--text-main); width: 100%; font-size: 18px; }
        .btn-primary:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 20px rgba(162, 210, 255, 0.5); }
        .btn-secondary { background: linear-gradient(135deg, #cdb4db, #ffc8dd); color: var(--text-main); }
        .btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(205, 180, 219, 0.5); }
        .btn-back { background: #f8f9fa; margin-bottom: 25px; box-shadow: none; border: 1px solid #dee2e6; }
        .btn-back:hover { background: #e9ecef; transform: translateX(-5px); }

        .role-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 40px; }
        .role-card {
            flex: 1; min-width: 250px; padding: 50px 20px; text-align: center; border-radius: 20px; cursor: pointer;
            transition: 0.4s; background: linear-gradient(135deg, #bde0fe, #a2d2ff); font-size: 22px; font-weight: 600; border: 3px solid white;
        }
        .role-card.staff { background: linear-gradient(135deg, #ffc8dd, #ffafcc); }
        .role-card:hover { transform: translateY(-10px) rotate(-1deg); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }

        .mood-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .mood-btn {
            background: var(--white); border: 3px solid #f8f9fa; border-radius: 20px; padding: 15px 10px;
            font-size: 18px; font-weight: 500; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 8px; position: relative; overflow: hidden;
        }
        .mood-btn span.emoji { font-size: 40px; transition: 0.3s; }
        .mood-btn:hover { transform: translateY(-5px); }
        .mood-btn:hover span.emoji { transform: scale(1.2); }
        
        .mood-btn[data-color="gold"].active { border-color: #ffd6a5; background: #fff9f0; box-shadow: 0 5px 15px rgba(255,214,165,0.5); }
        .mood-btn[data-color="green"].active { border-color: #caffbf; background: #f2fcf1; box-shadow: 0 5px 15px rgba(202,255,191,0.5); }
        .mood-btn[data-color="pink"].active { border-color: #ffadad; background: #fff0f0; box-shadow: 0 5px 15px rgba(255,173,173,0.5); }
        .mood-btn[data-color="blue"].active { border-color: #a0c4ff; background: #f0f5ff; box-shadow: 0 5px 15px rgba(160,196,255,0.5); }
        .mood-btn[data-color="orange"].active { border-color: #fdffb6; background: #fffff0; box-shadow: 0 5px 15px rgba(253,255,182,0.5); }
        .mood-btn[data-color="dark"].active { border-color: #bdb2ff; background: #f6f5ff; box-shadow: 0 5px 15px rgba(189,178,255,0.5); }
        .mood-btn[data-color="red"].active { border-color: #ffc6ff; background: #fff5ff; box-shadow: 0 5px 15px rgba(255,198,255,0.5); }
        .mood-btn[data-color="cyan"].active { border-color: #9bf6ff; background: #f0fdff; box-shadow: 0 5px 15px rgba(155,246,255,0.5); }

        textarea {
            width: 100%; height: 110px; padding: 18px; border: 2px solid #e9ecef; border-radius: 16px; resize: none;
            font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s; background: rgba(255,255,255,0.9);
        }
        textarea:focus { border-color: #a2d2ff; box-shadow: 0 0 0 4px rgba(162, 210, 255, 0.2); }

        select {
            width: 100%; padding: 15px; border-radius: 14px; border: 2px solid #e9ecef; margin-bottom: 25px; 
            font-size: 16px; outline: none; transition: 0.3s; background: white; cursor: pointer;
        }
        select:focus { border-color: #a2d2ff; }

        .chart-container {
            margin-top: 35px; padding-top: 25px; border-top: 2px dashed #cdb4db; animation: fadeIn 0.5s ease;
            background: white; border-radius: 20px; padding: 20px; box-shadow: var(--shadow);
        }

        .stats-box {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); color: var(--text-main);
            padding: 20px; border-radius: 16px; text-align: center; margin-bottom: 25px; font-size: 18px;
            font-weight: 500; border: 2px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        #encouragement-msg {
            display: none; background: #caffbf; padding: 18px; border-radius: 14px;
            text-align: center; margin-top: 25px; font-weight: 600; font-size: 18px;
            animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        /* ====== ส่วนที่เพิ่มใหม่: History Log ====== */
        .history-list {
            display: flex; flex-direction: column; gap: 15px; max-height: 400px; overflow-y: auto; padding-right: 5px;
        }
        /* แต่ง Scrollbar ให้สวยงาม */
        .history-list::-webkit-scrollbar { width: 8px; }
        .history-list::-webkit-scrollbar-thumb { background: #cdb4db; border-radius: 10px; }
        
        .history-card {
            background: #fdfdfd; border-left: 6px solid var(--primary-blue); padding: 18px;
            border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); text-align: left;
            border-top: 1px solid #f1f1f1; border-right: 1px solid #f1f1f1; border-bottom: 1px solid #f1f1f1;
        }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed #e9ecef; padding-bottom: 10px; margin-bottom: 10px; }
        .history-mood { font-size: 18px; font-weight: 600; color: #2b2d42; }
        .history-time { font-size: 14px; color: #6c757d; background: #f8f9fa; padding: 4px 10px; border-radius: 20px; }
        .history-note { font-size: 16px; color: #4a4e69; line-height: 1.5; white-space: pre-wrap; margin-top: 5px; }
        .history-note.empty { color: #adb5bd; font-style: italic; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        
        <div id="view-role-selection">
            <h1>🌈 ยินดีต้อนรับสู่ MindU</h1>
            <p class="text-center" style="font-size: 18px; color: #6c757d;">ระบบติดตามและดูแลสุขภาพจิตของนักศึกษา</p>
            <div class="role-buttons">
                <div class="role-card" onclick="switchView('view-student')">🎓 นักศึกษา<br><span style="font-size: 16px; font-weight: normal;">(Student)</span></div>
                <div class="role-card staff" onclick="switchView('view-staff')">👨‍🏫 อาจารย์ / บุคลากร<br><span style="font-size: 16px; font-weight: normal;">(Staff)</span></div>
            </div>
        </div>

        <div id="view-student" class="hidden">
            <button class="btn btn-back" onclick="switchView('view-role-selection')">⬅ กลับหน้าแรก</button>
            <h2>วันนี้ใจเป็นยังไงบ้าง? 💙</h2>
            
            <label for="student-major" style="font-weight: 500; margin-bottom: 8px; display: block;">มหาวิทยาลัยราชภัฏจันทรเกษม:</label>
            <select id="student-major">
                <optgroup label="คณะศึกษาศาสตร์">
                    <option value="Computer Education" selected>สาขาวิชาคอมพิวเตอร์ศึกษา (ComCru)</option>
                    <option value="Early Childhood Education">สาขาวิชาการศึกษาปฐมวัย</option>
                    <option value="Physical Education">สาขาวิชาพลศึกษา</option>
                </optgroup>
                <optgroup label="คณะวิทยาศาสตร์">
                    <option value="Information Technology">สาขาวิชาเทคโนโลยีสารสนเทศ</option>
                    <option value="Computer Science">สาขาวิชาวิทยาการคอมพิวเตอร์</option>
                </optgroup>
                <optgroup label="คณะวิทยาการจัดการ">
                    <option value="Business Administration">สาขาวิชาบริหารธุรกิจ</option>
                    <option value="Communication Arts">สาขาวิชานิเทศศาสตร์</option>
                </optgroup>
            </select>

            <div class="mood-grid" id="mood-selector">
                <button class="mood-btn" data-color="gold" onclick="selectMood('ตัวมารดา', this)"><span class="emoji">👑</span>ตัวมารดา</button>
                <button class="mood-btn" data-color="green" onclick="selectMood('ว้าวุ่น', this)"><span class="emoji">😵‍💫</span>ว้าวุ่น</button>
                <button class="mood-btn" data-color="pink" onclick="selectMood('ฉ่ำ', this)"><span class="emoji">✨</span>ฉ่ำ</button>
                <button class="mood-btn" data-color="blue" onclick="selectMood('นอยด์', this)"><span class="emoji">😞</span>นอยด์</button>
                <button class="mood-btn" data-color="orange" onclick="selectMood('จึ้ง', this)"><span class="emoji">🔥</span>จึ้ง</button>
                <button class="mood-btn" data-color="dark" onclick="selectMood('ขิต', this)"><span class="emoji">💀</span>ขิต</button>
                <button class="mood-btn" data-color="red" onclick="selectMood('จะเครซี่', this)"><span class="emoji">🤯</span>จะเครซี่</button>
                <button class="mood-btn" data-color="cyan" onclick="selectMood('กี่โมง', this)"><span class="emoji">⏰</span>กี่โมง</button>
            </div>

            <textarea id="student-note" placeholder="มีอะไรอยากระบาย พิมพ์ทิ้งไว้ตรงนี้ได้เลยนะ พื้นที่ปลอดภัยสำหรับคุณ..."></textarea>
            
            <button class="btn btn-primary" onclick="saveMood()">บันทึกใจไว้ 💌</button>
            <div id="encouragement-msg"></div>

            <div class="text-center mt-3">
                <button class="btn btn-secondary" onclick="toggleStudentStats()">ดูสถิติและประวัติของฉัน 📊</button>
            </div>

            <div id="student-stats-section" class="hidden chart-container">
                <h3>📈 สถิติอารมณ์ของคุณ</h3>
                <div id="daily-stats" class="stats-box">กำลังโหลดข้อมูล...</div>
                <canvas id="studentChart"></canvas>

                <h4 class="mt-4" style="color: #6c757d; border-top: 1px solid #e9ecef; padding-top: 20px;">📝 ประวัติความรู้สึกของคุณ</h4>
                <div id="student-history-list" class="history-list">
                    </div>
            </div>
        </div>

        <div id="view-staff" class="hidden">
            <button class="btn btn-back" onclick="switchView('view-role-selection')">⬅ กลับหน้าแรก</button>
            <h2>📊 Dashboard สุขภาพใจนักศึกษา</h2>
            
            <label for="staff-filter-major" style="font-weight: 500; margin-bottom: 8px; display: block;">กรองตามสาขาวิชา:</label>
            <select id="staff-filter-major" onchange="updateStaffDashboard()">
                <option value="All">รวมทุกสาขาวิชา</option>
                <option value="Computer Education">สาขาวิชาคอมพิวเตอร์ศึกษา (ComCru)</option>
                <option value="Information Technology">สาขาวิชาเทคโนโลยีสารสนเทศ</option>
                <option value="Business Administration">สาขาวิชาบริหารธุรกิจ</option>
            </select>

            <div class="chart-container">
                <canvas id="staffChart"></canvas>
            </div>

            <div class="stats-box" id="staff-summary" style="margin-top: 20px; background: white; border: 2px solid #ffc8dd;">
                กำลังประมวลผลข้อมูล...
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiUc6y2M5FCu-tEnY1mgYGgVhu7H-PFnE",
            authDomain: "mindu-9f4b0.firebaseapp.com",
            projectId: "mindu-9f4b0",
            storageBucket: "mindu-9f4b0.firebasestorage.app",
            messagingSenderId: "237113799668",
            appId: "1:237113799668:web:0842f44252a1650a3abfa1",
            measurementId: "G-BYCSEYKY06"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let appData = [];
        let currentSelectedMood = "";
        let studentChartInstance = null;
        let staffChartInstance = null;

        const encouragementMessages = [
            "เก่งมากเลยที่ผ่านวันนี้มาได้! 🌟",
            "พรุ่งนี้เริ่มต้นใหม่นะ พักผ่อนเยอะๆ 💤",
            "ไม่ว่าวันนี้จะเจออะไรมา คุณทำดีที่สุดแล้ว 💙",
            "ให้เวลาตัวเองได้พักบ้างนะ 🍃",
            "ข้อความของคุณถูกบันทึกไว้อย่างปลอดภัยแล้ว ✨"
        ];

        // จับคู่อิโมจิสำหรับแสดงในหน้าประวัติ
        const moodEmojiMap = {
            'ตัวมารดา': '👑', 'ว้าวุ่น': '😵‍💫', 'ฉ่ำ': '✨', 'นอยด์': '😞',
            'จึ้ง': '🔥', 'ขิต': '💀', 'จะเครซี่': '🤯', 'กี่โมง': '⏰'
        };

        window.switchView = (viewId) => {
            document.getElementById('view-role-selection').classList.add('hidden');
            document.getElementById('view-student').classList.add('hidden');
            document.getElementById('view-staff').classList.add('hidden');
            document.getElementById('student-stats-section').classList.add('hidden'); 
            
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'view-staff') updateStaffDashboard();
        };

        window.selectMood = (moodName, btnElement) => {
            currentSelectedMood = moodName;
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        };

        const fireConfetti = () => {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#a2d2ff', '#ffc8dd', '#cdb4db', '#fcf6bd'] });
        };

        window.saveMood = async () => {
            if (!currentSelectedMood) {
                alert("กรุณาเลือกอารมณ์ของวันนี้ก่อนบันทึกนะ 😊"); return;
            }

            const record = {
                mood: currentSelectedMood,
                major: document.getElementById('student-major').value,
                note: document.getElementById('student-note').value,
                timestamp: Date.now() // เก็บเวลาแบบ Timestamp เพื่อนำไปแปลงภายหลัง
            };

            fireConfetti();

            const msgBox = document.getElementById('encouragement-msg');
            msgBox.innerText = encouragementMessages[Math.floor(Math.random() * encouragementMessages.length)];
            msgBox.style.display = 'block';

            document.getElementById('student-note').value = "";
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('active'));
            currentSelectedMood = "";

            try {
                await addDoc(collection(db, "mood_records"), record);
            } catch (error) {
                appData.push(record);
                if (!document.getElementById('student-stats-section').classList.contains('hidden')) {
                    updateStudentChart();
                    renderStudentHistory(); // อัปเดตประวัติทันทีถ้าเปิดหน้าสถิติอยู่
                }
            }

            setTimeout(() => { msgBox.style.display = 'none'; }, 5000);
        };

        window.toggleStudentStats = () => {
            const statsSection = document.getElementById('student-stats-section');
            if (statsSection.classList.contains('hidden')) {
                statsSection.classList.remove('hidden');
                updateStudentChart();
                renderStudentHistory(); // โหลดประวัติเมื่อกดดูสถิติ
            } else {
                statsSection.classList.add('hidden');
            }
        };

        // ฟังก์ชันใหม่: แสดงประวัติข้อความและเวลา
        window.renderStudentHistory = () => {
            const historyContainer = document.getElementById('student-history-list');
            historyContainer.innerHTML = '';

            // เรียงข้อมูลจากใหม่ล่าสุด ไป เก่าสุด
            const sortedData = [...appData].sort((a, b) => b.timestamp - a.timestamp);

            if (sortedData.length === 0) {
                historyContainer.innerHTML = '<p class="text-center" style="color: #adb5bd;">ยังไม่มีบันทึกเลย ลองบันทึกความรู้สึกแรกกันดูนะ!</p>';
                return;
            }

            sortedData.forEach(item => {
                // แปลง Timestamp เป็นรูปแบบวันที่และเวลาที่อ่านง่าย (ภาษาไทย)
                const dateObj = new Date(item.timestamp);
                const timeString = dateObj.toLocaleDateString('th-TH', { 
                    year: 'numeric', month: 'short', day: 'numeric' 
                }) + ' เวลา ' + dateObj.toLocaleTimeString('th-TH', { 
                    hour: '2-digit', minute:'2-digit' 
                }) + ' น.';

                const emoji = moodEmojiMap[item.mood] || '';
                
                // ตกแต่งสีกรอบตามอารมณ์
                let borderColor = '#a2d2ff';
                if(['ตัวมารดา', 'ฉ่ำ'].includes(item.mood)) borderColor = '#ffd6a5';
                if(['ว้าวุ่น', 'นอยด์', 'ขิต'].includes(item.mood)) borderColor = '#ffadad';
                if(['จึ้ง'].includes(item.mood)) borderColor = '#fdffb6';

                // ตรวจสอบว่ามีข้อความระบายไหม
                const noteHtml = item.note.trim() !== '' 
                    ? `<div class="history-note">💭 "${item.note}"</div>` 
                    : `<div class="history-note empty">ไม่มีข้อความเพิ่มเติม</div>`;

                historyContainer.innerHTML += `
                    <div class="history-card" style="border-left-color: ${borderColor};">
                        <div class="history-header">
                            <span class="history-mood">${emoji} ${item.mood}</span>
                            <span class="history-time">🕒 ${timeString}</span>
                        </div>
                        ${noteHtml}
                    </div>
                `;
            });
        };

        window.updateStudentChart = () => {
            const today = new Date().setHours(0,0,0,0);
            const recordsToday = appData.filter(d => new Date(d.timestamp).setHours(0,0,0,0) === today);
            
            document.getElementById('daily-stats').innerHTML = `
                📅 วันนี้คุณบันทึกความรู้สึกไปแล้ว: <b style="font-size: 24px;">${recordsToday.length}</b> ครั้ง<br>
                <span style="font-size:16px; color:var(--text-main);">อารมณ์ล่าสุด: <b>${recordsToday.length > 0 ? recordsToday[recordsToday.length-1].mood : '-'}</b></span>
            `;

            const ctx = document.getElementById('studentChart').getContext('2d');
            const recentData = appData.slice(-10);
            const labels = recentData.map((d, i) => `ครั้งที่ ${i+1}`);
            const dataPoints = recentData.map(d => {
                const moodScores = { 'ตัวมารดา':5, 'ฉ่ำ':5, 'จึ้ง':4, 'ว้าวุ่น':3, 'กี่โมง':3, 'จะเครซี่':2, 'นอยด์':2, 'ขิต':1 };
                return moodScores[d.mood] || 3;
            });

            if(studentChartInstance) studentChartInstance.destroy();
            studentChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'ระดับพลังงานใจ (1=ขิต, 5=ตัวมารดา)',
                        data: dataPoints,
                        borderColor: '#cdb4db', backgroundColor: 'rgba(205, 180, 219, 0.3)', 
                        borderWidth: 3, tension: 0.4, fill: true, pointBackgroundColor: '#ffafcc', pointRadius: 5
                    }]
                },
                options: { responsive: true, scales: { y: { min: 0, max: 6 } } }
            });
        };

        window.updateStaffDashboard = () => {
            const selectedMajor = document.getElementById('staff-filter-major').value;
            const ctx = document.getElementById('staffChart').getContext('2d');

            const filteredData = selectedMajor === 'All' ? appData : appData.filter(d => d.major === selectedMajor);
            const moodCounts = {};
            filteredData.forEach(d => { moodCounts[d.mood] = (moodCounts[d.mood] || 0) + 1; });

            const labels = Object.keys(moodCounts);
            const data = Object.values(moodCounts);

            if(staffChartInstance) staffChartInstance.destroy();
            
            staffChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#ffd6a5', '#caffbf', '#ffadad', '#a0c4ff', '#fdffb6', '#bdb2ff', '#ffc6ff', '#9bf6ff'],
                        borderWidth: 2, hoverOffset: 10
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'right' } } }
            });

            const summaryDiv = document.getElementById('staff-summary');
            if(filteredData.length === 0) {
                summaryDiv.innerHTML = "ยังไม่มีข้อมูลนักศึกษาในสาขานี้ครับ 🍃";
            } else {
                let mostFrequentMood = labels.reduce((a, b) => moodCounts[a] > moodCounts[b] ? a : b);
                summaryDiv.innerHTML = `
                    <strong>💡 สรุปภาพรวมแบบ Real-time:</strong><br><br>
                    มีการบันทึกทั้งหมด <b>${filteredData.length}</b> ครั้ง <br>
                    อารมณ์ส่วนใหญ่ของนักศึกษาในกลุ่มนี้คือ: <b style="color: #ff006e; font-size: 20px;">"${mostFrequentMood}"</b> 
                `;
            }
        };

        // Real-time Listener 
        const q = query(collection(db, "mood_records"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            let firestoreData = [];
            snapshot.forEach((doc) => { firestoreData.push(doc.data()); });
            
            if(firestoreData.length === 0) {
                // ข้อมูลตัวอย่างสำหรับดูความสวยงามเบื้องต้น
                appData = [
                    { mood: 'ฉ่ำ', major: 'Computer Education', note: 'วันนี้เรียนเขียนโปรแกรมเข้าใจมาก!', timestamp: Date.now() - 86400000 },
                    { mood: 'นอยด์', major: 'Computer Education', note: 'ฝนตก รถติด มาสายเลย', timestamp: Date.now() - 3600000 },
                    { mood: 'ตัวมารดา', major: 'Information Technology', note: 'พรีเซนต์งานผ่านฉลุย เริ่ดมาก', timestamp: Date.now() - 10000 }
                ];
            } else {
                appData = firestoreData;
            }

            if (!document.getElementById('student-stats-section').classList.contains('hidden')) {
                updateStudentChart();
                renderStudentHistory(); // อัปเดตประวัติแบบ Real-time ด้วย
            }
            if (!document.getElementById('view-staff').classList.contains('hidden')) updateStaffDashboard();
        }, (error) => {
            console.warn("ใช้ระบบ Mock Data จำลองเนื่องจากไม่ได้เชื่อมต่อ:", error.message);
        });

    </script>
</body>
</html>
