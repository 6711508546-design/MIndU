<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindU - ระบบติดตามดูแลสุขภาพจิตนักศึกษา</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f0f7f4;
            --primary-blue: #a2d2ff;
            --primary-green: #bde0fe;
            --primary-purple: #cdb4db;
            --text-main: #3d405b;
            --white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 30px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1, h2, h3 { text-align: center; margin-bottom: 20px; }
        .text-center { text-align: center; }
        .mt-3 { margin-top: 20px; }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .btn-primary { background-color: var(--primary-blue); color: var(--text-main); width: 100%; font-size: 18px; }
        .btn-primary:hover { background-color: #8ec0ef; transform: scale(1.02); }
        
        .btn-secondary { background-color: var(--primary-purple); color: var(--text-main); }
        .btn-secondary:hover { background-color: #c0a5d0; transform: scale(1.02); }

        .btn-back { background-color: #e9ecef; margin-bottom: 20px; }

        .role-buttons {
            display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 30px;
        }
        .role-card {
            flex: 1; min-width: 250px; padding: 40px 20px; text-align: center; border-radius: 15px; cursor: pointer;
            transition: 0.3s; background-color: var(--primary-green); font-size: 20px; font-weight: 600;
        }
        .role-card:hover { transform: translateY(-5px); box-shadow: var(--shadow); }
        .role-card.staff { background-color: var(--primary-purple); }

        .mood-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; margin-bottom: 20px;
        }
        
        .mood-btn {
            background: var(--bg-color); border: 2px solid transparent; border-radius: 15px; padding: 15px 10px;
            font-size: 16px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .mood-btn span.emoji { font-size: 32px; }
        .mood-btn:hover { background: var(--primary-blue); }
        .mood-btn.active {
            border-color: var(--primary-purple); background: var(--primary-blue); box-shadow: 0 0 10px rgba(205, 180, 219, 0.5);
        }

        textarea {
            width: 100%; height: 100px; padding: 15px; border: 2px solid #e9ecef; border-radius: 12px; resize: none;
            font-size: 16px; margin-bottom: 20px; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--primary-blue); }

        select {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; margin-bottom: 20px; font-size: 16px;
        }

        .chart-container {
            margin-top: 30px; padding-top: 20px; border-top: 2px dashed #e9ecef; animation: fadeIn 0.5s ease;
        }

        .stats-box {
            background-color: var(--primary-green); padding: 15px; border-radius: 10px; text-align: center;
            margin-bottom: 20px; font-size: 16px; font-weight: 500;
        }

        #encouragement-msg {
            display: none; background-color: var(--primary-green); padding: 15px; border-radius: 10px;
            text-align: center; margin-top: 20px; font-weight: 500; animation: fadeIn 0.5s ease;
        }

        .dashboard-summary {
            background: var(--bg-color); padding: 20px; border-radius: 12px; margin-top: 20px; font-size: 16px; line-height: 1.6;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        
        <div id="view-role-selection">
            <h1>🌱 ยินดีต้อนรับสู่ MindU</h1>
            <p class="text-center">ระบบติดตามและดูแลสุขภาพจิตของนักศึกษา</p>
            <div class="role-buttons">
                <div class="role-card" onclick="switchView('view-student')">🎓 นักศึกษา (Student)</div>
                <div class="role-card staff" onclick="switchView('view-staff')">👨‍🏫 อาจารย์ / บุคลากร (Staff)</div>
            </div>
        </div>

        <div id="view-student" class="hidden">
            <button class="btn btn-back" onclick="switchView('view-role-selection')">⬅ กลับหน้าแรก</button>
            <h2>วันนี้ใจเป็นยังไงบ้าง? 💙</h2>
            
            <label for="student-major">สาขาวิชาของคุณ:</label>
            <select id="student-major">
                <optgroup label="คณะศึกษาศาสตร์">
                    <option value="Computer Education" selected>สาขาวิชาคอมพิวเตอร์ศึกษา</option>
                    <option value="Early Childhood Education">สาขาวิชาการศึกษาปฐมวัย</option>
                    <option value="Physical Education">สาขาวิชาพลศึกษา</option>
                </optgroup>
                <optgroup label="คณะวิทยาศาสตร์">
                    <option value="Information Technology">สาขาวิชาเทคโนโลยีสารสนเทศ</option>
                    <option value="Computer Science">สาขาวิชาวิทยาการคอมพิวเตอร์</option>
                    <option value="Data Science">สาขาวิชาวิทยาการข้อมูล</option>
                </optgroup>
                <optgroup label="คณะวิทยาการจัดการ">
                    <option value="Business Administration">สาขาวิชาบริหารธุรกิจ</option>
                    <option value="Accounting">สาขาวิชาบัญชี</option>
                    <option value="Communication Arts">สาขาวิชานิเทศศาสตร์</option>
                </optgroup>
                <optgroup label="คณะมนุษยศาสตร์และสังคมศาสตร์">
                    <option value="English">สาขาวิชาภาษาอังกฤษ</option>
                    <option value="Public Administration">สาขาวิชารัฐประศาสนศาสตร์</option>
                    <option value="Law">สาขาวิชานิติศาสตร์</option>
                </optgroup>
            </select>

            <div class="mood-grid" id="mood-selector">
                <button class="mood-btn" onclick="selectMood('ตัวมารดา', this)"><span class="emoji">🌊</span>ตัวมารดา</button>
                <button class="mood-btn" onclick="selectMood('ว้าวุ่น', this)"><span class="emoji">🌀</span>ว้าวุ่น</button>
                <button class="mood-btn" onclick="selectMood('ฉ่ำ', this)"><span class="emoji">💦</span>ฉ่ำ</button>
                <button class="mood-btn" onclick="selectMood('นอยด์', this)"><span class="emoji">🌧️</span>นอยด์</button>
                <button class="mood-btn" onclick="selectMood('จึ้ง', this)"><span class="emoji">🧊</span>จึ้ง</button>
                <button class="mood-btn" onclick="selectMood('ขิต', this)"><span class="emoji">🚱</span>ขิต</button>
                <button class="mood-btn" onclick="selectMood('จะเครซี่', this)"><span class="emoji">♨️</span>จะเครซี่</button>
                <button class="mood-btn" onclick="selectMood('กี่โมง', this)"><span class="emoji">🫧</span>กี่โมง</button>
            </div>

            <textarea id="student-note" placeholder="อยากระบายอะไรไหม? พิมพ์ทิ้งไว้ตรงนี้ได้เลยนะ..."></textarea>
            
            <button class="btn btn-primary" onclick="saveMood()">บันทึกใจไว้ 💌</button>
            <div id="encouragement-msg"></div>

            <div class="text-center mt-3">
                <button class="btn btn-secondary" onclick="toggleStudentStats()">ดูสถิติของฉัน 📊</button>
            </div>

            <div id="student-stats-section" class="hidden chart-container">
                <h3>📈 สถิติอารมณ์ของคุณ</h3>
                <div id="daily-stats" class="stats-box">กำลังโหลดข้อมูล...</div>
                <canvas id="studentChart"></canvas>
            </div>
        </div>

        <div id="view-staff" class="hidden">
            <button class="btn btn-back" onclick="switchView('view-role-selection')">⬅ กลับหน้าแรก</button>
            <h2>📊 ภาพรวมอารมณ์ของนักศึกษา (Real-time)</h2>
            
            <label for="staff-filter-major">เลือกดูตามสาขาวิชา:</label>
            <select id="staff-filter-major" onchange="updateStaffDashboard()">
                <option value="All">รวมทุกสาขาวิชา</option>
                <option value="Computer Education">สาขาวิชาคอมพิวเตอร์ศึกษา</option>
                <option value="Information Technology">สาขาวิชาเทคโนโลยีสารสนเทศ</option>
                <option value="Business Administration">สาขาวิชาบริหารธุรกิจ</option>
                <option value="English">สาขาวิชาภาษาอังกฤษ</option>
                </select>

            <div class="chart-container">
                <canvas id="staffChart"></canvas>
            </div>

            <div class="dashboard-summary" id="staff-summary">
                กำลังประมวลผลข้อมูล...
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDiUc6y2M5FCu-tEnY1mgYGgVhu7H-PFnE",
            authDomain: "mindu-9f4b0.firebaseapp.com",
            projectId: "mindu-9f4b0",
            storageBucket: "mindu-9f4b0.firebasestorage.app",
            messagingSenderId: "237113799668",
            appId: "1:237113799668:web:0842f44252a1650a3abfa1",
            measurementId: "G-BYCSEYKY06"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let appData = [];
        let currentSelectedMood = "";
        let studentChartInstance = null;
        let staffChartInstance = null;

        const encouragementMessages = [
            "เก่งมากเลยที่ผ่านวันนี้มาได้! 🌟",
            "พรุ่งนี้เริ่มต้นใหม่นะ พักผ่อนเยอะๆ 💤",
            "ไม่ว่าวันนี้จะเจออะไรมา คุณทำดีที่สุดแล้ว 💙",
            "รอยยิ้มของคุณมีค่าเสมอ 😊",
            "ให้เวลาตัวเองได้พักบ้างนะ 🍃"
        ];

        window.switchView = (viewId) => {
            document.getElementById('view-role-selection').classList.add('hidden');
            document.getElementById('view-student').classList.add('hidden');
            document.getElementById('view-staff').classList.add('hidden');
            document.getElementById('student-stats-section').classList.add('hidden'); // ปิดสถิติทุกครั้งที่เปลี่ยนหน้า
            
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'view-staff') updateStaffDashboard();
        };

        window.selectMood = (moodName, btnElement) => {
            currentSelectedMood = moodName;
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
        };

        window.saveMood = async () => {
            if (!currentSelectedMood) {
                alert("กรุณาเลือกอารมณ์ของวันนี้ก่อนบันทึกนะ 😊"); return;
            }

            const record = {
                mood: currentSelectedMood,
                major: document.getElementById('student-major').value,
                note: document.getElementById('student-note').value,
                timestamp: Date.now()
            };

            const msgBox = document.getElementById('encouragement-msg');
            msgBox.innerText = encouragementMessages[Math.floor(Math.random() * encouragementMessages.length)];
            msgBox.style.display = 'block';

            document.getElementById('student-note').value = "";
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('active'));
            currentSelectedMood = "";

            try {
                await addDoc(collection(db, "mood_records"), record);
            } catch (error) {
                // Fallback กรณี Firebase Rules ยังไม่อนุญาต
                appData.push(record);
                if (!document.getElementById('student-stats-section').classList.contains('hidden')) updateStudentChart();
            }

            setTimeout(() => { msgBox.style.display = 'none'; }, 5000);
        };

        window.toggleStudentStats = () => {
            const statsSection = document.getElementById('student-stats-section');
            if (statsSection.classList.contains('hidden')) {
                statsSection.classList.remove('hidden');
                updateStudentChart();
            } else {
                statsSection.classList.add('hidden');
            }
        };

        window.updateStudentChart = () => {
            // คำนวณจำนวนครั้งที่บันทึกในวันนี้
            const today = new Date().setHours(0,0,0,0);
            const recordsToday = appData.filter(d => new Date(d.timestamp).setHours(0,0,0,0) === today);
            
            document.getElementById('daily-stats').innerHTML = `
                📅 วันนี้คุณบันทึกความรู้สึกไปแล้ว: <b>${recordsToday.length}</b> ครั้ง<br>
                <span style="font-size:14px; color:var(--text-light);">อารมณ์ล่าสุด: ${recordsToday.length > 0 ? recordsToday[recordsToday.length-1].mood : '-'}</span>
            `;

            const ctx = document.getElementById('studentChart').getContext('2d');
            const recentData = appData.slice(-10); // ดู 10 ครั้งล่าสุด
            const labels = recentData.map((d, i) => `ครั้งที่ ${i+1}`);
            const dataPoints = recentData.map(d => {
                const moodScores = { 'ตัวมารดา':5, 'ฉ่ำ':4, 'จึ้ง':4, 'ว้าวุ่น':3, 'กี่โมง':3, 'นอยด์':2, 'จะเครซี่':2, 'ขิต':1 };
                return moodScores[d.mood] || 3;
            });

            if(studentChartInstance) studentChartInstance.destroy();
            studentChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'ระดับพลังงานใจ (1=ขิต, 5=ตัวมารดา)',
                        data: dataPoints,
                        borderColor: '#a2d2ff', backgroundColor: 'rgba(162, 210, 255, 0.2)', borderWidth: 2, tension: 0.3, fill: true
                    }]
                },
                options: { responsive: true, scales: { y: { min: 0, max: 6 } } }
            });
        };

        window.updateStaffDashboard = () => {
            const selectedMajor = document.getElementById('staff-filter-major').value;
            const ctx = document.getElementById('staffChart').getContext('2d');

            const filteredData = selectedMajor === 'All' ? appData : appData.filter(d => d.major === selectedMajor);
            const moodCounts = {};
            filteredData.forEach(d => { moodCounts[d.mood] = (moodCounts[d.mood] || 0) + 1; });

            const labels = Object.keys(moodCounts);
            const data = Object.values(moodCounts);

            if(staffChartInstance) staffChartInstance.destroy();
            staffChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{ label: 'จำนวนนักศึกษา', data: data, backgroundColor: ['#bde0fe', '#a2d2ff', '#cdb4db', '#ffc8dd'], borderRadius: 8 }]
                },
                options: { responsive: true, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
            });

            const summaryDiv = document.getElementById('staff-summary');
            if(filteredData.length === 0) {
                summaryDiv.innerHTML = "<strong>สรุป:</strong> ยังไม่มีข้อมูลนักศึกษาในสาขานี้";
            } else {
                let mostFrequentMood = labels.reduce((a, b) => moodCounts[a] > moodCounts[b] ? a : b);
                summaryDiv.innerHTML = `
                    <strong>💡 สรุปภาพรวมแบบ Real-time:</strong><br>
                    จากการบันทึกทั้งหมด <b>${filteredData.length}</b> ครั้ง <br>
                    พบว่าอารมณ์ส่วนใหญ่ตอนนี้คือ <b>"${mostFrequentMood}"</b> 
                `;
            }
        };

        // Real-time Listener ดึงข้อมูลสดๆ จาก Firebase
        const q = query(collection(db, "mood_records"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            let firestoreData = [];
            snapshot.forEach((doc) => { firestoreData.push(doc.data()); });
            
            // ถ้า Firebase ไม่มีข้อมูล ให้ใส่ข้อมูลจำลองไปก่อนเพื่อให้เห็นภาพกราฟ
            if(firestoreData.length === 0) {
                appData = [
                    { mood: 'ฉ่ำ', major: 'Computer Education', note: '', timestamp: Date.now() - 86400000 },
                    { mood: 'นอยด์', major: 'Computer Education', note: '', timestamp: Date.now() - 3600000 },
                    { mood: 'ตัวมารดา', major: 'Information Technology', note: '', timestamp: Date.now() }
                ];
            } else {
                appData = firestoreData;
            }

            // สั่งอัปเดตกราฟอัตโนมัติถ้าเปิดหน้านั้นอยู่
            if (!document.getElementById('student-stats-section').classList.contains('hidden')) updateStudentChart();
            if (!document.getElementById('view-staff').classList.contains('hidden')) updateStaffDashboard();
        }, (error) => {
            console.warn("Real-time Update Failed (Using Mock):", error.message);
        });

    </script>
</body>
</html>
