<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💙</text></svg>">
    <title>MindU - ระบบติดตามสุขภาพใจ</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <style>
        /* CSS โทนสีพาสเทลและ Responsive */
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');
        
        :root {
            --primary: #A2D2FF;
            --secondary: #BDE0FE;
            --accent: #FFAFCC;
            --text-dark: #4A4A4A;
            --bg-light: #F8F9FA;
            --white: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: none; /* ซ่อนทุกหน้าไว้ก่อน */
        }

        .active-screen {
            display: block; /* แสดงเฉพาะหน้าที่มีคลาสนี้ */
        }

        h1, h2 {
            text-align: center;
            color: #6C757D;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 10px;
            display: block;
        }

        /* ปุ่มและ Form */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #8bc1f5; }
        
        .btn-accent { background: var(--accent); color: #fff; }
        .btn-accent:hover { background: #f79abd; }
        
        .btn-back { background: #E9ECEF; color: #495057; }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #E9ECEF;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            outline: none;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
        }

        /* ปุ่มอารมณ์ */
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .mood-btn {
            background: var(--bg-light);
            border: 2px solid transparent;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .mood-btn:hover { background: var(--secondary); }
        .mood-btn.selected {
            background: var(--secondary);
            border-color: var(--primary);
            transform: scale(1.05);
        }

        .mood-emoji { font-size: 24px; display: block; margin-bottom: 5px; }

        /* การ์ดประวัติ (Student History) */
        .history-card {
            background: var(--bg-light);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            border-left: 5px solid var(--accent);
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #6c757d;
            margin-bottom: 5px;
        }

        /* กราฟ */
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
            margin-top: 20px;
        }

        .summary-box {
            background: var(--secondary);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="role-screen" class="container active-screen">
        <span class="logo">💙</span>
        <h1>MindU</h1>
        <p style="text-align: center; margin-bottom: 30px;">ยินดีต้อนรับสู่พื้นที่ปลอดภัยของคุณ</p>
        <button class="btn-primary" onclick="switchScreen('student-screen')">👩‍🎓 ฉันคือนักศึกษา</button>
        <button class="btn-accent" onclick="switchScreen('login-screen')">👨‍🏫 ฉันคืออาจารย์ / บุคลากร</button>
    </div>

    <div id="login-screen" class="container">
        <span class="logo">🔐</span>
        <h2>เข้าสู่ระบบอาจารย์</h2>
        <input type="password" id="staff-password" placeholder="กรุณาใส่รหัสผ่าน (20043)">
        <p id="login-error" style="color: red; display: none; text-align: center; margin-bottom: 10px;">รหัสผ่านไม่ถูกต้อง!</p>
        <button class="btn-accent" onclick="checkPassword()">เข้าสู่ระบบ</button>
        <button class="btn-back" onclick="switchScreen('role-screen')">กลับ</button>
    </div>

    <div id="student-screen" class="container">
        <h2>วันนี้ใจเป็นยังไงบ้าง? 🌿</h2>
        
        <select id="student-major">
            <option value="" disabled selected>-- เลือกสาขาวิชาของคุณ --</option>
            <option value="คอมพิวเตอร์ศึกษา">คอมพิวเตอร์ศึกษา</option>
            <option value="วิทยาการคอมพิวเตอร์">วิทยาการคอมพิวเตอร์</option>
            <option value="เทคโนโลยีสารสนเทศ">เทคโนโลยีสารสนเทศ</option>
            <option value="วิศวกรรมซอฟต์แวร์">วิศวกรรมซอฟต์แวร์</option>
        </select>

        <div class="mood-grid" id="mood-container">
            </div>

        <textarea id="student-text" rows="4" placeholder="ระบายความรู้สึกของคุณที่นี่ (อาจารย์จะไม่เห็นข้อความนี้)..."></textarea>
        
        <button class="btn-primary" onclick="saveMood()">บันทึกใจไว้ 💌</button>
        <button class="btn-back" onclick="switchScreen('role-screen')">กลับไปหน้าแรก</button>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">
        
        <h3>📝 ประวัติการบันทึกของคุณ</h3>
        <div id="student-history-list">
            </div>
    </div>

    <div id="staff-screen" class="container" style="max-width: 800px;">
        <h2>📊 ภาพรวมอารมณ์นักศึกษา</h2>
        
        <select id="filter-major" onchange="loadStaffDashboard()">
            <option value="all">ดูทุกสาขาวิชา</option>
            <option value="คอมพิวเตอร์ศึกษา">คอมพิวเตอร์ศึกษา</option>
            <option value="วิทยาการคอมพิวเตอร์">วิทยาการคอมพิวเตอร์</option>
            <option value="เทคโนโลยีสารสนเทศ">เทคโนโลยีสารสนเทศ</option>
            <option value="วิศวกรรมซอฟต์แวร์">วิศวกรรมซอฟต์แวร์</option>
        </select>

        <div class="chart-container">
            <canvas id="moodChart"></canvas>
        </div>

        <div class="summary-box" id="staff-summary">
            กำลังโหลดข้อมูลสรุป...
        </div>

        <button class="btn-back" onclick="switchScreen('role-screen')" style="margin-top: 20px;">ออกจากระบบ</button>
    </div>

    <script>
        // --- 1. การตั้งค่า Firebase ---
        const firebaseConfig = {
            apiKey: "AIzaSyDiUc6y2M5FCu-tEnY1mgYGgVhu7H-PFnE",
            authDomain: "mindu-9f4b0.firebaseapp.com",
            projectId: "mindu-9f4b0",
            storageBucket: "mindu-9f4b0.firebasestorage.app",
            messagingSenderId: "237113799668",
            appId: "1:237113799668:web:0842f44252a1650a3abfa1",
            measurementId: "G-BYCSEYKY06"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 2. ตัวแปรและข้อมูลพื้นฐาน ---
        const moods = [
            { id: "mother", emoji: "👑", text: "ตัวมารดา" },
            { id: "confused", emoji: "😵‍💫", text: "ว้าวุ่น" },
            { id: "glow", emoji: "✨", text: "ฉ่ำ" },
            { id: "noid", emoji: "😞", text: "นอยด์" },
            { id: "fire", emoji: "🔥", text: "จึ้ง" },
            { id: "dead", emoji: "💀", text: "ขิต" },
            { id: "crazy", emoji: "🤯", text: "จะเครซี่" },
            { id: "time", emoji: "⏰", text: "กี่โมง" },
            { id: "water", emoji: "💧", text: "น้ำตาไหล" } // เพิ่มตามที่ต้องการ
        ];

        let selectedMood = null;
        let chartInstance = null;

        // ดึง Local Device ID เพื่อใช้โชว์ประวัตินักศึกษาเครื่องนั้นๆ
        let deviceId = localStorage.getItem("mindu_device_id");
        if (!deviceId) {
            deviceId = "device_" + Math.random().toString(36).substr(2, 9);
            localStorage.setItem("mindu_device_id", deviceId);
        }

        const messages = [
            "เก่งมากที่ผ่านวันนี้มาได้นะ 💙",
            "พักผ่อนเยอะๆ พรุ่งนี้เริ่มต้นใหม่ 🌟",
            "ไม่เป็นไรนะ กอดๆ 🤗",
            "คุณทำดีที่สุดแล้ว ภูมิใจในตัวเองเถอะ ✨"
        ];

        // --- 3. ฟังก์ชันการทำงานของ UI ---
        function switchScreen(screenId) {
            document.querySelectorAll('.container').forEach(el => el.classList.remove('active-screen'));
            document.getElementById(screenId).classList.add('active-screen');

            if (screenId === 'student-screen') {
                renderMoodButtons();
                loadStudentHistory();
            } else if (screenId === 'staff-screen') {
                loadStaffDashboard();
            }
        }

        function renderMoodButtons() {
            const container = document.getElementById('mood-container');
            container.innerHTML = '';
            moods.forEach(mood => {
                const btn = document.createElement('div');
                btn.className = 'mood-btn';
                btn.innerHTML = `<span class="mood-emoji">${mood.emoji}</span>${mood.text}`;
                btn.onclick = () => {
                    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedMood = mood;
                };
                container.appendChild(btn);
            });
        }

        // --- 4. ฟังก์ชันของฝั่งนักศึกษา ---
        async function saveMood() {
            const major = document.getElementById('student-major').value;
            const text = document.getElementById('student-text').value;

            if (!major) return alert("กรุณาเลือกสาขาวิชาของคุณด้วยนะ 😊");
            if (!selectedMood) return alert("เลือกอารมณ์วันนี้ให้หน่อยนะ 🥺");

            const entry = {
                deviceId: deviceId,
                major: major,
                moodText: selectedMood.text,
                moodEmoji: selectedMood.emoji,
                text: text, // บันทึกข้อความ แต่จะไม่ดึงไปแสดงฝั่งอาจารย์
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                // บันทึกลง Firebase
                await db.collection("mindu_entries").add(entry);
                
                // สุ่มข้อความให้กำลังใจ
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                alert(`บันทึกสำเร็จ! 🎉\n${randomMsg}`);
                
                // เคลียร์ฟอร์ม
                document.getElementById('student-text').value = '';
                document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                selectedMood = null;

                // รีเฟรชประวัติ
                loadStudentHistory();

            } catch (error) {
                console.error("Error saving document: ", error);
                alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล");
            }
        }

        async function loadStudentHistory() {
            const list = document.getElementById('student-history-list');
            list.innerHTML = '<p>กำลังโหลดประวัติ...</p>';

            try {
                const snapshot = await db.collection("mindu_entries")
                    .where("deviceId", "==", deviceId)
                    .orderBy("timestamp", "desc")
                    .limit(5)
                    .get();

                if (snapshot.empty) {
                    list.innerHTML = '<p style="text-align:center; color:#999;">ยังไม่มีประวัติการบันทึก เริ่มบันทึกความรู้สึกแรกของคุณเลย!</p>';
                    return;
                }

                list.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const date = data.timestamp ? data.timestamp.toDate().toLocaleString('th-TH') : 'เมื่อสักครู่';
                    
                    const card = document.createElement('div');
                    card.className = 'history-card';
                    card.innerHTML = `
                        <div class="history-header">
                            <span>อารมณ์: ${data.moodEmoji} ${data.moodText}</span>
                            <span>${date}</span>
                        </div>
                        <p style="margin-top: 10px; color: #444;">${data.text ? data.text : '<i>(ไม่มีข้อความระบาย)</i>'}</p>
                    `;
                    list.appendChild(card);
                });
            } catch (error) {
                console.error("Error loading history: ", error);
                list.innerHTML = '<p>ไม่สามารถโหลดประวัติได้</p>';
            }
        }

        // --- 5. ฟังก์ชันของฝั่งอาจารย์ ---
        function checkPassword() {
            const pwd = document.getElementById('staff-password').value;
            if (pwd === "20043") {
                document.getElementById('staff-password').value = '';
                document.getElementById('login-error').style.display = 'none';
                switchScreen('staff-screen');
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        async function loadStaffDashboard() {
            const filter = document.getElementById('filter-major').value;
            
            try {
                let query = db.collection("mindu_entries");
                if (filter !== "all") {
                    query = query.where("major", "==", filter);
                }
                
                const snapshot = await query.get();
                const moodCounts = {};
                let totalEntries = 0;

                snapshot.forEach(doc => {
                    // ดึงแค่อารมณ์มานับ (ไม่ดึงข้อความระบายมาใช้งาน)
                    const mood = doc.data().moodText;
                    moodCounts[mood] = (moodCounts[mood] || 0) + 1;
                    totalEntries++;
                });

                updateChart(moodCounts);
                updateSummary(moodCounts, totalEntries, filter);

            } catch (error) {
                console.error("Error loading dashboard: ", error);
            }
        }

        function updateChart(data) {
            const ctx = document.getElementById('moodChart').getContext('2d');
            
            if (chartInstance) {
                chartInstance.destroy();
            }

            const labels = Object.keys(data);
            const values = Object.values(data);

            if (labels.length === 0) {
                // ถ้าไม่มีข้อมูล
                chartInstance = new Chart(ctx, {
                    type: 'pie',
                    data: { labels: ['ไม่มีข้อมูล'], datasets: [{ data: [1], backgroundColor: ['#eee'] }] }
                });
                return;
            }

            chartInstance = new Chart(ctx, {
                type: 'pie', // ใช้กราฟวงกลมดูสัดส่วน
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            '#FFB5E8', '#B28DFF', '#AFCBFF', '#AFF8DB', 
                            '#FFC9DE', '#FFABAB', '#FFC3A0', '#D5AAFF', '#85E3FF'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });
        }

        function updateSummary(data, total, filter) {
            const summaryBox = document.getElementById('staff-summary');
            if (total === 0) {
                summaryBox.innerHTML = `ยังไม่มีข้อมูลการบันทึกอารมณ์ของนักศึกษา${filter === 'all' ? 'ทั้งหมด' : 'สาขานี้'}`;
                return;
            }

            // หาอารมณ์ที่เยอะที่สุด
            let maxMood = '';
            let maxCount = 0;
            for (const [mood, count] of Object.entries(data)) {
                if (count > maxCount) {
                    maxCount = count;
                    maxMood = mood;
                }
            }

            let text = `มีการบันทึกทั้งหมด <b>${total}</b> ครั้ง <br>`;
            text += `อารมณ์ส่วนใหญ่ของนักศึกษาคือ <b>"${maxMood}"</b> (${maxCount} คน)`;
            summaryBox.innerHTML = text;
        }

    </script>
</body>
</html>
